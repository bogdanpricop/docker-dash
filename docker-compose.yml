services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "${APP_VERSION:-5.0.2}"
    image: docker-dash:${APP_VERSION:-5.0.2}
    container_name: docker-dash
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8101}:${APP_PORT:-8101}"
    volumes:
      # Docker socket — read-only for security
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent data (SQLite DB, stats)
      - docker-dash-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${APP_PORT:-8101}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Security: no privilege escalation, but needs docker socket
    security_opt:
      - no-new-privileges:true

  # Optional HTTPS reverse proxy — enable by setting ENABLE_TLS=true in .env
  # Access via https://192.168.13.20:8443 (self-signed cert for internal network)
  caddy:
    image: caddy:2-alpine
    container_name: docker-dash-caddy
    restart: unless-stopped
    ports:
      - "${TLS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    profiles:
      - tls

volumes:
  docker-dash-data:
    name: docker-dash-data
  caddy-data:
  caddy-config:
