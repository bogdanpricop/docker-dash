<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Dash — Reset Password</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F433;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06090f; color:#b1bac4; font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { width:100%; max-width:420px; padding:24px; }
  .logo { text-align:center; margin-bottom:24px; }
  .logo span { font-size:48px; }
  .logo h1 { color:#e6edf3; font-size:20px; margin-top:8px; }
  .card { background:#161b22; border:1px solid rgba(48,54,61,0.6); border-radius:12px; padding:28px 24px; }
  .card h2 { color:#388bfd; font-size:18px; margin-bottom:16px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; color:#8b949e; margin-bottom:6px; font-weight:500; }
  .form-control { width:100%; padding:10px 12px; background:#0d1117; border:1px solid rgba(48,54,61,0.6); border-radius:6px; color:#e6edf3; font-size:14px; font-family:inherit; transition:border 0.2s; }
  .form-control:focus { outline:none; border-color:#388bfd; }
  .btn { width:100%; padding:12px; background:#388bfd; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; font-family:inherit; }
  .btn:hover { background:#58a6ff; }
  .btn:disabled { background:#21262d; color:#545d68; cursor:not-allowed; }
  .msg { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px; }
  .msg-error { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#f85149; }
  .msg-success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#3fb950; }
  .msg-info { background:rgba(56,139,253,0.1); border:1px solid rgba(56,139,253,0.3); color:#388bfd; }
  .user-badge { display:inline-block; background:#0d1117; padding:4px 12px; border-radius:4px; font-family:monospace; color:#e6edf3; font-weight:600; }
  .back-link { display:block; text-align:center; margin-top:20px; color:#388bfd; text-decoration:none; font-size:13px; }
  .back-link:hover { color:#58a6ff; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span>&#x1F433;</span>
    <h1>Docker Dash</h1>
  </div>

  <!-- Loading State -->
  <div class="card" id="loading-state">
    <div class="msg msg-info"><span class="spinner"></span> <span id="loading-text">Validating token...</span></div>
  </div>

  <!-- Error State -->
  <div class="card hidden" id="error-state">
    <div class="msg msg-error" id="error-msg"></div>
    <a href="/" class="back-link" id="back-login-err"></a>
  </div>

  <!-- Reset Form -->
  <div class="card hidden" id="reset-form-state">
    <h2 id="form-title"></h2>
    <div class="msg msg-info" style="margin-bottom:16px" id="user-info-msg"></div>
    <form id="reset-form">
      <div class="form-group">
        <label id="lbl-new-pw"></label>
        <input type="password" id="new-password" class="form-control" required minlength="6">
      </div>
      <div class="form-group">
        <label id="lbl-confirm-pw"></label>
        <input type="password" id="confirm-password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn" id="submit-btn"></button>
    </form>
  </div>

  <!-- Success State -->
  <div class="card hidden" id="success-state">
    <div class="msg msg-success" id="success-msg"></div>
    <a href="/" class="back-link" id="back-login-ok"></a>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const isInvite = params.get('invite') === '1';

  // Detect language from referrer cookie or browser
  const lang = (document.cookie.match(/dd_lang=(\w+)/) || [])[1]
    || (navigator.language.startsWith('ro') ? 'ro' : 'en');
  const isRo = lang === 'ro';

  // Translations
  const t = {
    loading: isRo ? 'Se valideaza token-ul...' : 'Validating token...',
    invalidToken: isRo ? 'Token invalid sau expirat. Solicitati un nou link.' : 'Invalid or expired token. Please request a new link.',
    resetTitle: isRo ? 'Reseteaza Parola' : 'Reset Password',
    inviteTitle: isRo ? 'Seteaza Parola' : 'Set Your Password',
    resetInfo: isRo ? 'Seteaza o parola noua pentru utilizatorul:' : 'Set a new password for user:',
    inviteInfo: isRo ? 'Bine ai venit! Seteaza parola pentru contul tau:' : 'Welcome! Set the password for your account:',
    newPw: isRo ? 'Parola noua' : 'New Password',
    confirmPw: isRo ? 'Confirma parola' : 'Confirm Password',
    submitReset: isRo ? 'Reseteaza Parola' : 'Reset Password',
    submitInvite: isRo ? 'Seteaza Parola' : 'Set Password',
    mismatch: isRo ? 'Parolele nu se potrivesc' : 'Passwords do not match',
    tooShort: isRo ? 'Parola trebuie sa aiba cel putin 6 caractere' : 'Password must be at least 6 characters',
    successReset: isRo ? 'Parola a fost resetata cu succes!' : 'Password has been reset successfully!',
    successInvite: isRo ? 'Parola a fost setata cu succes! Acum te poti autentifica.' : 'Password set successfully! You can now log in.',
    backToLogin: isRo ? 'Inapoi la autentificare' : 'Back to login',
    saving: isRo ? 'Se salveaza...' : 'Saving...',
    error: isRo ? 'Eroare' : 'Error',
  };

  document.getElementById('loading-text').textContent = t.loading;
  document.getElementById('back-login-err').textContent = t.backToLogin;
  document.getElementById('back-login-ok').textContent = t.backToLogin;

  function showState(id) {
    ['loading-state','error-state','reset-form-state','success-state'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  if (!token) {
    document.getElementById('error-msg').textContent = t.invalidToken;
    showState('error-state');
    return;
  }

  // Validate token
  fetch('/api/auth/validate-reset-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token }),
  })
  .then(r => r.json())
  .then(data => {
    if (!data.valid) {
      document.getElementById('error-msg').textContent = t.invalidToken;
      showState('error-state');
      return;
    }

    const actualInvite = data.type === 'invite' || isInvite;

    document.getElementById('form-title').textContent = actualInvite ? t.inviteTitle : t.resetTitle;
    document.getElementById('user-info-msg').innerHTML = `${actualInvite ? t.inviteInfo : t.resetInfo} <span class="user-badge">${data.username}</span>`;
    document.getElementById('lbl-new-pw').textContent = t.newPw;
    document.getElementById('lbl-confirm-pw').textContent = t.confirmPw;
    document.getElementById('submit-btn').textContent = actualInvite ? t.submitInvite : t.submitReset;
    showState('reset-form-state');

    document.getElementById('reset-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (pw !== confirm) { alert(t.mismatch); return; }
      if (pw.length < 6) { alert(t.tooShort); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> ' + t.saving;

      fetch('/api/auth/reset-password-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pw }),
      })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          document.getElementById('success-msg').textContent = actualInvite ? t.successInvite : t.successReset;
          showState('success-state');
        } else {
          btn.disabled = false;
          btn.textContent = actualInvite ? t.submitInvite : t.submitReset;
          alert(res.error || t.error);
        }
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = actualInvite ? t.submitInvite : t.submitReset;
        alert(t.error);
      });
    });
  })
  .catch(() => {
    document.getElementById('error-msg').textContent = t.invalidToken;
    showState('error-state');
  });
})();
</script>
</body>
</html>
